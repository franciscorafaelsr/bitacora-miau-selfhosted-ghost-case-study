<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Service Color Gradients -->
    <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    
    <linearGradient id="proxyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    
    <linearGradient id="smtpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    
    <linearGradient id="recipientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Shadow Effect -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5" />
    </filter>
    
    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="16" />
  
  <!-- Grid Lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" />
  </g>

  <!-- Title -->
  <text x="40" y="45" fill="#f8fafc" font-family="sans-serif" font-size="22" font-weight="bold" letter-spacing="0.5">Bitácora Miau - Flujo de Correo Masivo (Newsletter)</text>
  <text x="40" y="70" fill="#94a3b8" font-family="sans-serif" font-size="13">Resolución de API de Mailgun redirigida a SMTP Relay secundario</text>

  <!-- GHOST CMS -->
  <g filter="url(#shadow)">
    <rect x="50" y="160" width="160" height="90" rx="8" fill="url(#ghostGrad)" />
    <text x="130" y="200" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Ghost CMS</text>
    <text x="130" y="222" fill="#fce7f3" font-family="sans-serif" font-size="11" text-anchor="middle">Emite campaña masiva</text>
    <text x="130" y="238" fill="#fce7f3" font-family="sans-serif" font-size="10" text-anchor="middle">Lista de receptores en 'to'</text>
  </g>

  <!-- MAILGUN COMPATIBLE PROXY -->
  <g filter="url(#shadow)">
    <rect x="290" y="160" width="200" height="90" rx="8" fill="url(#proxyGrad)" />
    <text x="390" y="195" fill="#ffffff" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">mailgun-proxy</text>
    <text x="390" y="215" fill="#f5f3ff" font-family="sans-serif" font-size="11" text-anchor="middle">1. Multer parsea payload HTTP</text>
    <text x="390" y="230" fill="#f5f3ff" font-family="sans-serif" font-size="11" text-anchor="middle">2. Segmenta en lotes de 1000</text>
    <text x="390" y="243" fill="#f5f3ff" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Express Node.js app</text>
  </g>

  <!-- UPSTREAM SMTP RELAY -->
  <g filter="url(#shadow)">
    <rect x="570" y="160" width="180" height="90" rx="8" fill="url(#smtpGrad)" />
    <text x="660" y="200" fill="#ffffff" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">SMTP Relay</text>
    <text x="660" y="222" fill="#dbeafe" font-family="sans-serif" font-size="11" text-anchor="middle">Brevo / Mailcow / SES</text>
    <text x="660" y="238" fill="#dbeafe" font-family="sans-serif" font-size="10" text-anchor="middle">Despacha lotes vía SMTP</text>
  </g>

  <!-- RECIPIENTS (Right-bottom) -->
  <g filter="url(#shadow)">
    <rect x="570" y="320" width="180" height="60" rx="8" fill="url(#recipientGrad)" />
    <text x="660" y="348" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Lector / Suscriptor</text>
    <text x="660" y="366" fill="#f1f5f9" font-family="sans-serif" font-size="10" text-anchor="middle">Inbox (Gmail, Outlook, etc.)</text>
  </g>

  <!-- CONNECTORS -->
  <!-- Ghost -> Mailgun Proxy (HTTP POST) -->
  <path d="M 210 205 L 282 205" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <text x="246" y="195" fill="#e2e8f0" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="bold">HTTP POST</text>
  <text x="246" y="220" fill="#cbd5e1" font-family="sans-serif" font-size="9" text-anchor="middle">/v3/:domain/messages</text>

  <!-- Mailgun Proxy -> SMTP Relay (SMTP connection) -->
  <path d="M 490 205 L 562 205" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <text x="526" y="195" fill="#e2e8f0" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="bold">NodeMailer</text>
  <text x="526" y="220" fill="#cbd5e1" font-family="sans-serif" font-size="9" text-anchor="middle">SMTP Relay (Lotes)</text>

  <!-- SMTP Relay -> Recipient -->
  <path d="M 660 250 L 660 312" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <text x="670" y="285" fill="#cbd5e1" font-family="sans-serif" font-size="9" text-anchor="start">Entregabilidad</text>

</svg>
