# ==============================================================================
# Nginx Caching Accelerator Configuration for Ghost CMS (Template)
# ==============================================================================
# Renombrar este archivo a 'nginx.conf' en el entorno de producción.
# ==============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logs optimizados
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'Cache:$upstream_cache_status';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --------------------------------------------------------------------------
    # Definición de la Zona de Caché
    # --------------------------------------------------------------------------
    # Guarda la caché en disco en /var/cache/nginx
    # keys_zone reserva 10MB de RAM para llaves (suficiente para ~80,000 llaves)
    # max_size limita el tamaño del almacenamiento físico a 1GB
    # inactive limpia archivos no leídos en 60 minutos
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=ghost_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # Servidor Upstream apuntando al contenedor Ghost CMS
    upstream ghost_backend {
        server ghost:2368;
    }

    server {
        listen 80;
        server_name localhost;

        # Cabeceras de seguridad globales
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Inyecta el estado de la caché en la cabecera HTTP para auditoría
        add_header X-Cache-Status $upstream_cache_status;

        # ----------------------------------------------------------------------
        # Lógica de Bypass de Caché
        # ----------------------------------------------------------------------
        set $skip_cache 0;

        # 1. No cachear métodos que no sean GET o HEAD (POST, PUT, DELETE, etc.)
        if ($request_method !~ ^(GET|HEAD)$) {
            set $skip_cache 1;
        }

        # 2. No cachear consultas con parámetros de búsqueda (ej. previsualizaciones)
        if ($query_string != "") {
            set $skip_cache 1;
        }

        # 3. No cachear URLs del panel de administración, API o previsualizaciones
        if ($request_uri ~* "(/ghost/|/ghost/api/|/p/|/subscribe/|/account/)") {
            set $skip_cache 1;
        }

        # 4. No cachear si hay cookies de miembros o administradores activos
        # ghost-members-ssr identifica miembros logueados en el portal.
        if ($http_cookie ~* "(ghost-members-ssr|ghost-admin-api-session)") {
            set $skip_cache 1;
        }

        # ----------------------------------------------------------------------
        # Configuración del Proxy Reverso hacia Ghost CMS
        # ----------------------------------------------------------------------
        location / {
            proxy_pass http://ghost_backend;
            
            # Encabezados de proxy estándar
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Directivas de Caché
            proxy_cache ghost_cache;
            proxy_cache_key "$scheme$proxy_host$request_uri";
            proxy_cache_valid 200 301 302 30m; # Páginas válidas se guardan por 30 minutos
            proxy_cache_valid 404 1m;           # Errores 404 se guardan por 1 minuto
            
            # Saltarse caché si se activa la bandera de skip_cache
            proxy_cache_bypass $skip_cache;
            proxy_no_cache $skip_cache;

            # ------------------------------------------------------------------
            # Tolerancia a Fallos y Alta Disponibilidad (Stale-While-Revalidate)
            # ------------------------------------------------------------------
            # Si Ghost CMS cae o está cargando, entrega una página obsoleta
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            
            # Actualiza el recurso expirado en segundo plano
            proxy_cache_background_update on;
            
            # Previene colisiones de solicitudes al regenerar el recurso
            proxy_cache_lock on;
        }

        # ----------------------------------------------------------------------
        # Caché Agresivo para Recursos Estáticos
        # ----------------------------------------------------------------------
        location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf)$ {
            proxy_pass http://ghost_backend;
            proxy_set_header Host $http_host;
            
            expires 30d;
            add_header Cache-Control "public, no-transform";
            
            proxy_cache ghost_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_bypass $cookie_ghost_admin_api_session;
            proxy_no_cache $cookie_ghost_admin_api_session;
        }
    }
}
